name: Unity Windows Build

on:
  #push:
  #  branches:
  #    - main
  workflow_dispatch:

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: true
      - uses: actions/cache@v5
        with:
          path: Beat The Market/Library
          key:
            Library-Beat The Market-StandaloneWindows64-${{ hashFiles('Beat The Market') }}
          restore-keys: |
            Library-Beat The Market-StandaloneWindows64-
            Library-Beat The Market-
            Library-
      - uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          buildName: 'Beat The Market'
          projectPath: Beat The Market
          unityVersion: 6000.4.3f1
          targetPlatform: StandaloneWindows64 # Build a Windows 64-bit standalone.
      - uses: actions/upload-artifact@v7
        with:
          name: Beat The Market-win
          path: build
